name: Notify PR Review Requested

on:
  pull_request:
    types: [review_requested]

jobs:
  notify:
    uses: masakirocorp/.github/.github/workflows/notify-review-requested.yml@master
    with:
      pr_number: ${{ github.event.pull_request.number }}
      pr_title: ${{ github.event.pull_request.title }}
      pr_url: ${{ github.event.pull_request.html_url }}
      pr_author: ${{ github.event.pull_request.user.login }}
      reviewer_login: ${{ github.event.requested_reviewer.login }}
      requester_login: ${{ github.event.sender.login }}
      repo_name: ${{ github.repository }}
    secrets:
      DISCORD_WEBHOOK_CODE_REVIEW: ${{ secrets.DISCORD_WEBHOOK_CODE_REVIEW }}
