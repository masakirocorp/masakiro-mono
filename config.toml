cap = 690
ascender = 740
sb = 85 # Perfect

accentWidth = 182
accentClearance = 76
accentHeight = 162
accentStackOffset = 208

leading = 1250
parenSize = 860
dotSize = 'blend(weight, [100, 110], [400, 125], [900, 150])'
periodSize = 140

essRatio = 1.03
essRatioUpper = 1.03
essRatioLower = 1.03
essRatioQuestion = 1.03
archDepth = 152
smallArchDepth = 157