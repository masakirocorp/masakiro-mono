# Studio-focused coverage: broad Latin text plus the symbols commonly
# needed in source code, terminals, technical writing, and Powerline prompts.
[buildPlans.MasakiroMono.subset.include]
ranges = [
  [0x0020, 0x007E], # Basic Latin
  [0x00A0, 0x024F], # Latin-1 Supplement–Latin Extended-B
  [0x0259, 0x0259], # IPA Extensions
  [0x0272, 0x0272], # IPA Extensions
  [0x02B0, 0x036F], # Spacing Modifier Letters–Combining Diacritical Marks
  [0x03A9, 0x03A9], # Greek and Coptic
  [0x1AB0, 0x1ACF], # Combining Diacritical Marks Extended
  [0x1AD9, 0x1AEB], # Combining Diacritical Marks Extended
  [0x1DC3, 0x1EFF], # Combining Diacritical Marks Supplement–Latin Extended Additional
  [0x2010, 0x2026], # General Punctuation
  [0x2030, 0x2030], # General Punctuation
  [0x2039, 0x203D], # General Punctuation
  [0x2044, 0x2049], # General Punctuation
  [0x2070, 0x2079], # Superscripts and Subscripts
  [0x2080, 0x2089], # Superscripts and Subscripts
  [0x20A1, 0x20BF], # Currency Symbols
  [0x20D0, 0x20F0], # Combining Diacritical Marks for Symbols
  [0x2103, 0x2103], # Letterlike Symbols
  [0x2109, 0x2109], # Letterlike Symbols
  [0x2113, 0x2116], # Letterlike Symbols
  [0x2122, 0x2122], # Letterlike Symbols
